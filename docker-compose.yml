services:
  postgres:
    image: postgres:17
    container_name: webhook-postgres
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook_dev_password
      POSTGRES_DB: webhookdb
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: webhook-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
