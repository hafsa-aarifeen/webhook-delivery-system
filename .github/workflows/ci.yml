name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore backend/WebhookSystem.slnx

      - name: Build
        run: dotnet build backend/WebhookSystem.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test backend/WebhookSystem.slnx --no-build --configuration Release --verbosity normal
